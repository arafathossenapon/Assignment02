<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment02</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <style>
        .inter {
            font-family: "Inter", sans-serif;
            font-optical-sizing: auto;
        }
    </style>

    <link rel="stylesheet" href="./tails.css">

</head>

<body class="inter bg-[#1A0B2E] text-white">
    <header>
        <nav class="max-w-[1200px] mx-auto p-6 flex justify-between items-center ">
            <div>
                <h1 class="text-3xl font-extrabold">
                    Tech<span class="text-pink-500 ">Wave</span>
                </h1>
            </div>
            <ul class="hidden lg:flex  gap-8">
                <li><a href="">About</a></li>
                <li><a href="">Episodes</a></li>
                <li><a href="">Host</a></li>
            </ul>
            <button
                class="hidden lg:block font-semibold px-4 py-3 rounded-full bg-linear-to-r from-yellow-500 via-pink-500 to-purple-500 ">Subscribe
                <i class="fa-solid fa-arrow-right"></i></button>

            <div>
                <button class="lg:hidden"><i class="fa-solid fa-bars"></i></button>
            </div>
        </nav>
    </header>
    <main>
        <section>
            <div class="bg-[url(./assets/hero-bg.png)] bg-no-repeat bg-center bg-contain px-4 py-16 max-w-[1200px] mx-auto text-center">

                <div class="relative w-fit mx-auto">

                    <img src="./assets/hero-circle.png" class="w-56 sm:w-72 md:w-80 lg:w-[350px] mx-auto">

                    <img src="./assets/microphone.png"
                        class="absolute top-1/2 left-1/2 w-16 sm:w-20 md:w-24 lg:w-28 -translate-x-1/2 -translate-y-1/2">

                    <span
                        class="absolute top-2 right-2 sm:top-3 sm:right-3 bg-[#00FF88] text-black text-xs sm:text-sm px-4 py-2 rounded-full font-semibold">
                        NEW
                    </span>

                </div>


            </div>

            <div class="max-w-[550px] mx-auto mt-10 mb-10 lg:mb-24  text-center ">
                <h1 class="inter lg:text-6xl font-extrabold text-white text-center mb-2 text-4xl">TechWave</h1>
                <p class="inter text-[16px] mb-6">Your daily dose of tech insights, productivity hacks, and personal growth</p>
                <div class="flex gap-2 justify-center">
                    <button class=" bg-linear-to-r from-yellow-500 via-pink-500 to-purple-500 px-5 py-3 rounded-full font-semibold"><i class="fa-brands fa-spotify"></i> Listen On Spotify</button>
                    <button class="border border-[#00FF88] rounded-full px-5 py-3 text-[#00FF88] font-semibold"><i class="fa-regular fa-envelope"></i> Subscribe</button>
                </div>
            </div>
        </section>

    </main>

</body>

</html>
